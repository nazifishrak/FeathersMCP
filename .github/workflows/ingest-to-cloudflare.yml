name: Sync Community Posts to Cloudflare

on:
  issues:
    types: [closed]

jobs:
  ingest:
    # ONLY RUN IF:
    # 1. The issue has the 'community-contribution' label
    # 2. The person who closed it is a maintainer (OWNER, MEMBER, or COLLABORATOR)
    if: |
      contains(github.event.issue.labels.*.name, 'community-contribution') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ingest to Cloudflare
        shell: node {0}
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          INGESTION_SECRET: ${{ secrets.INGESTION_SECRET }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          async function run() {
            const body = process.env.ISSUE_BODY;

            // Manual Regex-based Parsing of Frontmatter (No 'gray-matter' dependency needed!)
            const titleMatch = body.match(/title:\s*["'](.+?)["']/);
            const authorMatch = body.match(/author:\s*["'](.+?)["']/);
            const tagsMatch = body.match(/tags:\s*(\[.+?\])/);

            // Extract the main content (everything after the second '---')
            const contentParts = body.split('---');
            const content = contentParts.length > 2 ? contentParts.slice(2).join('---').trim() : body;

            if (!titleMatch) {
              console.log('Skipping ingestion: Could not find title in issue body frontmatter.');
              return;
            }

            const title = titleMatch[1];
            const author = authorMatch ? authorMatch[1] : 'unknown';
            let tags = '';
            try {
              if (tagsMatch) {
                const tagsArray = JSON.parse(tagsMatch[1]);
                tags = Array.isArray(tagsArray) ? tagsArray.join(',') : tagsArray;
              }
            } catch (e) {
              console.error('Failed to parse tags:', e);
            }

            const payload = {
              title: title,
              slug: title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, ''),
              author: author,
              content: content,
              excerpt: content.substring(0, 200).trim() + '...',
              tags: tags,
              pr_url: process.env.ISSUE_URL
            };

            console.log(`Ingesting Community Post: ${payload.title}`);

            const response = await fetch(`${process.env.CLOUDFLARE_WORKER_URL}/ingest`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.INGESTION_SECRET}`
              },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const error = await response.text();
              throw new Error(`Cloudflare Ingestion failed: ${error}`);
            }
            console.log(`Successfully ingested post from Issue: ${payload.title}`);
          }

          run().catch(err => {
            console.error(err);
            process.exit(1);
          });
