name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/
            data/
            package.json
            package-lock.json
            .vscode/
            .cursor/

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        run: zip -r "feathersjs-mcp-v${{ steps.version.outputs.VERSION }}.zip" build/ data/ node_modules/ package.json .vscode/ .cursor/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading artifact"
            gh release upload "$TAG" "feathersjs-mcp-v${{ steps.version.outputs.VERSION }}.zip" --clobber
          else
            gh release create "$TAG" \
              "feathersjs-mcp-v${{ steps.version.outputs.VERSION }}.zip" \
              --target main \
              --title "Feathers MCP $TAG" \
              --notes "Compiled JavaScript, documentation database, and production dependencies."
          fi

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
